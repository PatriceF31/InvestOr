name: InvestOr CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1 : Compilation + Tests smart contracts ───────────────────────────
  contracts:
    name: Smart Contracts — compile & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Compile contracts (force)
        run: cd backend && npm run compile:force

      - name: Generate ERC1967Proxy artifact
        run: cd backend && node scripts/generate-proxy-artifact.cjs

      - name: Run GLD tests
        run: cd backend && npm run test:gld

      - name: Run Treasury tests
        run: cd backend && npm run test:treasury

      - name: Run Exchange tests
        run: cd backend && npm run test:exchange

      - name: Run Reserve tests
        run: cd backend && npm run test:reserve

      - name: Run Oracle tests
        run: cd backend && npx hardhat test test/Oracle.test.ts

      - name: Run EventLogger tests
        run: cd backend && npx hardhat test test/EventLogger.test.ts

      - name: Run SerialNumber tests
        run: cd backend && npx hardhat test test/SerialNumber.test.ts

  # ── Job 2 : Build frontend ────────────────────────────────────────────────
  frontend:
    name: Frontend — build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm install --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_DEFAULT_CHAIN: sepolia
          NEXT_PUBLIC_SEPOLIA_RPC_URL: https://ethereum-sepolia-rpc.publicnode.com
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.WALLETCONNECT_PROJECT_ID }}
          NEXT_PUBLIC_GOLD_API_KEY: demo
